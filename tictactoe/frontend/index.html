<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
        border: 2px solid #333;
        background-color: #fff;
      }
      .cell {
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3em;
        font-weight: bold;
        border: 1px solid #ccc;
        cursor: pointer;
      }
      .cell:hover {
        background-color: #e0e0e0;
      }
      .status {
        margin-top: 20px;
        font-size: 1.5em;
        font-weight: bold;
      }
      .reset-button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 1em;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status"></div>
    <div class="board" id="board">
      <div class="cell" data-row="0" data-col="0"></div>
      <div class="cell" data-row="0" data-col="1"></div>
      <div class="cell" data-row="0" data-col="2"></div>
      <div class="cell" data-row="1" data-col="0"></div>
      <div class="cell" data-row="1" data-col="1"></div>
      <div class="cell" data-row="1" data-col="2"></div>
      <div class="cell" data-row="2" data-col="0"></div>
      <div class="cell" data-row="2" data-col="1"></div>
      <div class="cell" data-row="2" data-col="2"></div>
    </div>
    <button class="reset-button" id="resetButton">Reset Game</button>

    <script>
      const statusDisplay = document.getElementById("status");
      const boardCells = document.querySelectorAll(".cell");
      const resetButton = document.getElementById("resetButton");

      const API_URL = "/api"; // Routing via Ingress

      let board = [
        ["", "", ""],
        ["", "", ""],
        ["", "", ""],
      ];
      let currentPlayer = "X";
      let gameOver = false;
      let winner = null;

      async function updateStatus() {
        try {
          const response = await fetch(`${API_URL}/status`);
          const data = await response.json();
          board = data.board;
          currentPlayer = data.current_player;
          gameOver = data.game_over;
          winner = data.winner;
          renderBoard();
          displayStatus();
        } catch (error) {
          console.error("Error fetching status:", error);
          statusDisplay.textContent = "Error: Could not connect to backend.";
        }
      }

      function renderBoard() {
        boardCells.forEach((cell) => {
          const row = cell.dataset.row;
          const col = cell.dataset.col;
          cell.textContent = board[row][col];
        });
      }

      function displayStatus() {
        if (gameOver) {
          if (winner) {
            statusDisplay.textContent = `Player ${winner} wins!`;
          } else {
            statusDisplay.textContent = "It's a tie!";
          }
        } else {
          statusDisplay.textContent = `Current Player: ${currentPlayer}`;
        }
      }

      async function handleCellClick(event) {
        if (gameOver) return;

        const row = event.target.dataset.row;
        const col = event.target.dataset.col;

        try {
          const response = await fetch(`${API_URL}/move`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ row: parseInt(row), col: parseInt(col) }),
          });

          const data = await response.json();
          if (response.ok) {
            board = data.board;
            currentPlayer = data.current_player;
            gameOver = data.game_over;
            winner = data.winner;
            renderBoard();
            displayStatus();
          } else {
            alert(data.message);
          }
        } catch (error) {
          console.error("Error making move:", error);
          alert("Error connecting to the game server.");
        }
      }

      async function handleResetGame() {
        try {
          const response = await fetch(`${API_URL}/reset`, {
            method: "POST",
          });
          const data = await response.json();
          board = data.board;
          currentPlayer = data.current_player;
          gameOver = data.game_over;
          winner = data.winner;
          renderBoard();
          displayStatus();
        } catch (error) {
          console.error("Error resetting game:", error);
          alert("Error resetting the game.");
        }
      }

      boardCells.forEach((cell) =>
        cell.addEventListener("click", handleCellClick),
      );
      resetButton.addEventListener("click", handleResetGame);

      updateStatus(); // Initial status load
    </script>
  </body>
</html>
